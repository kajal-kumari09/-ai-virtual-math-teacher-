<!DOCTYPE html>
<html>
<head>
    <title>AI Virtual Math Teacher</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>AI Virtual Math Teacher 🤖</h1>

        <!-- Chat Box -->
        <div id="chat-box"></div>

        <!-- Input Area -->
        <input type="text" id="input" placeholder="Ask a math question...">
        <button onclick="sendMessage()">Send</button>
        <button onclick="clearChat()">Clear</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
